# =============================================================================
# Alembic Configuration for DMRE
# The sqlalchemy.url is intentionally left blank here; it is injected at
# runtime from the DATABASE_URL_SYNC environment variable inside alembic/env.py
# so that secrets never live in this file.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Blank — overridden in alembic/env.py via os.environ["DATABASE_URL_SYNC"]
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
