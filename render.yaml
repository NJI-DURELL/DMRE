# =============================================================================
# render.yaml — DMRE deployment manifest
#
#   • Docker web service          (backend, FastAPI + embedded ChromaDB)
#   • Managed PostgreSQL          (per-user accounts + memories metadata)
#   • Persistent 5 GB disk        (Chroma vectors + HuggingFace model cache)
#   • Static site                 (React dashboard, built with Vite)
#
# Env vars marked `sync: false` are NOT committed to git — Render will prompt
# you for them in the dashboard on the first deploy and persist them across
# redeploys. Fill them in once and forget.
# =============================================================================

databases:
  - name: dmre-postgres
    plan: free
    databaseName: dmre
    user: dmre

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI + embedded ChromaDB
  # ---------------------------------------------------------------------------
  - type: web
    name: dmre-backend
    runtime: docker
    plan: starter           # Bump to a paid plan if free RAM is too tight for the embedder.
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true

    disk:
      name: dmre-data
      mountPath: /data
      sizeGB: 5             # ChromaDB + HuggingFace model cache.

    envVars:
      # ---- Database ----
      # Render injects DATABASE_URL with the sync (postgresql://) scheme; the
      # app coerces it to postgresql+asyncpg:// at load time (see config.py).
      - key: DATABASE_URL
        fromDatabase:
          name: dmre-postgres
          property: connectionString
      - key: DATABASE_URL_SYNC
        fromDatabase:
          name: dmre-postgres
          property: connectionString

      # ---- ChromaDB ----
      - key: CHROMA_MODE
        value: embedded
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma
      - key: CHROMA_COLLECTION
        value: dmre_memories

      # ---- Auth ----
      # generateValue=true makes Render mint a long random string on first
      # deploy and persist it across restarts.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "43200"

      # ---- CORS ----
      # Fill in via the Render dashboard once you know the dashboard origin
      # and the published Chrome extension ID, e.g.:
      #   https://dmre-dashboard.onrender.com,chrome-extension://abcdef...
      - key: CORS_ORIGINS
        sync: false

      # ---- SMTP (REQUIRED — signup returns 503 without it) ----
      # Recommended: Resend (free 100/day). Set these in the Render dashboard:
      #   SMTP_HOST   smtp.resend.com
      #   SMTP_PORT   587
      #   SMTP_TLS    starttls
      #   SMTP_USER   resend
      #   SMTP_PASS   re_xxxxxxxxxxxxxxxxxxxx
      #   SMTP_FROM   "DMRE <noreply@yourdomain.com>"   (must be a verified sender)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_TLS
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

      # Used inside email bodies to link back to the dashboard, e.g.
      #   https://dmre-dashboard.onrender.com
      - key: APP_BASE_URL
        sync: false

      # ---- Blockchain (disabled by default) ----
      - key: GANACHE_RPC_URL
        value: ""
      - key: CONTRACT_ADDRESS
        value: ""

      # ---- HuggingFace cache on the persistent disk ----
      # So a redeploy doesn't re-download Sentence-BERT every time.
      - key: HF_HOME
        value: /data/hf
      - key: SENTENCE_TRANSFORMERS_HOME
        value: /data/hf/sentence-transformers

  # ---------------------------------------------------------------------------
  # Dashboard — React static site built by Vite
  # ---------------------------------------------------------------------------
  - type: web
    name: dmre-dashboard
    runtime: static
    rootDir: dashboard
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeploy: true

    # SPA fallback: every route serves index.html so client-side routing works.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      # Baked into the bundle at build time by Vite. Point at the backend
      # service above — fill in once you know the URL Render assigned, e.g.:
      #   https://dmre-backend.onrender.com
      - key: VITE_BACKEND_URL
        sync: false
